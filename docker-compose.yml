services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sorbonne
      POSTGRES_USER: sorbonne
      POSTGRES_PASSWORD: sorbonne
    ports:
      - "5433:5432"
    volumes:
      - sorbonne-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sorbonne -d sorbonne"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  sorbonne-postgres:
